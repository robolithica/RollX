<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>RollX</title>

<style>

body {
  font-family: Helvetica, sans-serif;
  text-align: center;
  background: #111;
  color: #fff;
}

h1 {
  margin-top: 20px;
}

button {
  margin: 10px;
  padding: 6px 10px;
  font-size: 12px;
  border: none;
  border-radius: 6px;
  background: #8B00FF;
  color: white;
  cursor: pointer;
}

button:hover {
  background: #CF9FFF;
}

select, input {
  margin: 5px;
  padding: 3px;
  font-size: 10px;
}

#dice-selection {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 10px;
}

#dice-container {
  margin-top: 20px;
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 10px;
}

.die-wrapper {
  display: inline-flex;
  align-items: center;
  justify-content: center;
}

.die-wrapper img {
  width: 100%;
  height: 100%;
  object-fit: contain;
}

.face-slot {
  width: 40px;
  height: 40px;
  border: 2px dashed #555;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
}

.face-slot.selected {
  border: 2px solid #4CAF50;
}

#face-slots {
  display: flex;
  justify-content: center;
  gap: 10px;
  margin: 15px;
}

#symbol-picker {
  display: flex;
  justify-content: center;
  flex-wrap: wrap;
  gap: 10px;
}

.symbol {
  width: 20px;
  height: 20px;
  cursor: pointer;
  background: #222;
  padding: 4px;
}

#color-picker {
  display: flex;
  justify-content: center;
  gap: 5px;
}

.color-option {
  width: 15px;
  height: 15px;
  border: 2px solid #555;
  cursor: pointer;
}

.color-option.selected {
  border: 2px solid #4CAF50;
}

</style>
</head>

<body>

<h1>RollX Dice Roller</h1>

<!-- NAVIGATION -->

<button onclick="showScreen('main')">Roll</button>
<button onclick="showScreen('dice')">Dice</button>
<button onclick="showScreen('sets')">Sets</button>


<!-- MAIN SCREEN -->

<div id="main-screen">

<h3>Select Dice</h3>

<div id="dice-selection"></div>

<button onclick="rollDice()">Roll Dice</button>
<button onclick="clearDice()">Clear</button>

<div id="dice-container"></div>

</div>



<!-- DICE MANAGEMENT SCREEN -->

<div id="dice-manager" style="display:none;">

<h3>Die Color</h3>

<div id="color-picker">

<div class="color-option" data-color="#FF0000" style="background:#FF0000;"></div>
<div class="color-option" data-color="#00FF00" style="background:#00FF00;"></div>
<div class="color-option" data-color="#0000FF" style="background:#0000FF;"></div>
<div class="color-option" data-color="#FFFF00" style="background:#FFFF00;"></div>
<div class="color-option" data-color="#FF00FF" style="background:#FF00FF;"></div>
<div class="color-option" data-color="#00FFFF" style="background:#00FFFF;"></div>
<div class="color-option" data-color="#FFFFFF" style="background:#FFFFFF;"></div>
<div class="color-option" data-color="#222222" style="background:#222222;"></div>

</div>


<button id="create-die-btn">Create Die</button>


<div id="die-builder" style="display:none;">

<h3>Assign Faces</h3>

<div id="face-slots"></div>


<h3>Symbols</h3>

<div id="symbol-picker"></div>

<button id="save-die-btn">Save Die</button>

</div>


<h3>Delete Custom Die</h3>

<select id="delete-die-select"></select>

<button id="delete-die-btn">Delete Die</button>


</div>




<!-- SET MANAGEMENT SCREEN -->

<div id="set-manager" style="display:none;">

<h3>Dice Sets</h3>

<button id="save-set-btn">Save Current Set</button>

<br>

<select id="set-select"></select>

<button id="load-set-btn">Load Set</button>


<h3>Delete Set</h3>

<select id="delete-set-select"></select>

<button id="delete-set-btn">Delete Set</button>


</div>

<body>

<h1>RollX Dice Roller</h1>

<!-- NAVIGATION -->

<button onclick="showScreen('main')">Roll</button>
<button onclick="showScreen('dice')">Dice</button>
<button onclick="showScreen('sets')">Sets</button>


<!-- MAIN SCREEN -->

<div id="main-screen">

<h3>Select Dice</h3>

<div id="dice-selection"></div>

<button onclick="rollDice()">Roll Dice</button>
<button onclick="clearDice()">Clear</button>

<div id="dice-container"></div>

</div>



<!-- DICE MANAGEMENT SCREEN -->

<div id="dice-manager" style="display:none;">

<h3>Die Color</h3>

<div id="color-picker">

<div class="color-option" data-color="#FF0000" style="background:#FF0000;"></div>
<div class="color-option" data-color="#00FF00" style="background:#00FF00;"></div>
<div class="color-option" data-color="#0000FF" style="background:#0000FF;"></div>
<div class="color-option" data-color="#FFFF00" style="background:#FFFF00;"></div>
<div class="color-option" data-color="#FF00FF" style="background:#FF00FF;"></div>
<div class="color-option" data-color="#00FFFF" style="background:#00FFFF;"></div>
<div class="color-option" data-color="#FFFFFF" style="background:#FFFFFF;"></div>
<div class="color-option" data-color="#222222" style="background:#222222;"></div>

</div>


<button id="create-die-btn">Create Die</button>


<div id="die-builder" style="display:none;">

<h3>Assign Faces</h3>

<div id="face-slots"></div>


<h3>Symbols</h3>

<div id="symbol-picker"></div>

<button id="save-die-btn">Save Die</button>

</div>


<h3>Delete Custom Die</h3>

<select id="delete-die-select"></select>

<button id="delete-die-btn">Delete Die</button>


</div>




<!-- SET MANAGEMENT SCREEN -->

<div id="set-manager" style="display:none;">

<h3>Dice Sets</h3>

<button id="save-set-btn">Save Current Set</button>

<br>

<select id="set-select"></select>

<button id="load-set-btn">Load Set</button>


<h3>Delete Set</h3>

<select id="delete-set-select"></select>

<button id="delete-set-btn">Delete Set</button>


</div>

<script>
function saveCurrentDie(){

const name=prompt("Die name:");

if(!name)return;


const dice =
JSON.parse(localStorage.getItem("customDice") || "[]");


dice.push({

name:name,
faces:currentDieFaces,
color:selectedDieColor

});


localStorage.setItem(
"customDice",
JSON.stringify(dice)
);


buildDiceSlots();
populateDeleteDiceDropdown();


alert("Die saved!");

}







function saveCurrentSet(){

const name=prompt("Set name:");

if(!name)return;


const rows=document.querySelectorAll("#dice-selection > div");


const dice=[];


rows.forEach(row=>{


const select=row.querySelector("select");

const input=row.querySelector("input");


dice.push({

name:select.value,
quantity:input.value

});


});



const sets=
JSON.parse(localStorage.getItem("diceSets") || "[]");



sets.push({

name:name,
dice:dice

});



localStorage.setItem(
"diceSets",
JSON.stringify(sets)
);


populateSetDropdown();
populateDeleteSetDropdown();


alert("Set saved!");

}








function loadDiceSet(){


const name=
document.getElementById("set-select").value;


const sets=
JSON.parse(localStorage.getItem("diceSets") || "[]");



const set=sets.find(s=>s.name===name);


if(!set)return;



const rows=document.querySelectorAll("#dice-selection > div");



set.dice.forEach((die,index)=>{


if(rows[index]){


rows[index].querySelector("select").value=die.name;


rows[index].querySelector("input").value=die.quantity;


}


});


}








function populateSetDropdown(){


const select=document.getElementById("set-select");

select.innerHTML="";


const sets=
JSON.parse(localStorage.getItem("diceSets") || "[]");



sets.forEach(set=>{


const option=document.createElement("option");

option.value=set.name;

option.textContent=set.name;


select.appendChild(option);


});


}








function populateDeleteDiceDropdown(){


const select=
document.getElementById("delete-die-select");


if(!select)return;


select.innerHTML="";


const dice=
JSON.parse(localStorage.getItem("customDice") || "[]");



dice.forEach(d=>{


const option=document.createElement("option");


option.value=d.name;

option.textContent=d.name;


select.appendChild(option);


});


}








function deleteDie(){


const name=
document.getElementById("delete-die-select").value;



let dice=
JSON.parse(localStorage.getItem("customDice") || "[]");



dice=dice.filter(d=>d.name!==name);



localStorage.setItem(
"customDice",
JSON.stringify(dice)
);



buildDiceSlots();

populateDeleteDiceDropdown();



alert("Die deleted");


}








function populateDeleteSetDropdown(){


const select=
document.getElementById("delete-set-select");


if(!select)return;


select.innerHTML="";


const sets=
JSON.parse(localStorage.getItem("diceSets") || "[]");



sets.forEach(set=>{


const option=document.createElement("option");


option.value=set.name;

option.textContent=set.name;


select.appendChild(option);


});


}








function deleteSet(){


const name=
document.getElementById("delete-set-select").value;



let sets=
JSON.parse(localStorage.getItem("diceSets") || "[]");



sets=sets.filter(s=>s.name!==name);



localStorage.setItem(
"diceSets",
JSON.stringify(sets)
);



populateSetDropdown();

populateDeleteSetDropdown();



alert("Set deleted");


}










document.querySelectorAll(".color-option").forEach(option=>{


option.onclick=()=>{


selectedDieColor=option.dataset.color;


document.querySelectorAll(".color-option")
.forEach(o=>o.classList.remove("selected"));



option.classList.add("selected");


renderFaceSlots();


};


});








document.getElementById("create-die-btn").onclick=()=>{


document.getElementById("die-builder").style.display="block";


};







document.getElementById("save-die-btn")
.onclick=saveCurrentDie;


document.getElementById("save-set-btn")
.onclick=saveCurrentSet;


document.getElementById("load-set-btn")
.onclick=loadDiceSet;


document.getElementById("delete-die-btn")
.onclick=deleteDie;


document.getElementById("delete-set-btn")
.onclick=deleteSet;







renderSymbolPicker();

renderFaceSlots();

buildDiceSlots();

populateSetDropdown();

populateDeleteDiceDropdown();

populateDeleteSetDropdown();



</script>


</body>
